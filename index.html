<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>ClawOS | Security-First AI Skills Platform</title>
    <meta
      name="description"
      content="ClawOS is a security-first AI skills platform for professionals. Start with CareerClaw — job search automation on Web and Telegram, free."
    />
    <link rel="canonical" href="https://clawoshq.com/" />

    <!-- Open Graph -->
    <meta property="og:title" content="ClawOS — AI Skills Platform" />
    <meta
      property="og:description"
      content="ClawOS is a security-first AI skills platform for professionals. Start with CareerClaw today and grow into focused AI workflows across channels."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://clawoshq.com/" />
    <meta property="og:image" content="https://clawoshq.com/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ClawOS — AI Skills Platform" />
    <meta
      name="twitter:description"
      content="Security-first AI skills platform for professionals. CareerClaw is live now."
    />

    <!-- Fonts: Syne (display), DM Sans (body), JetBrains Mono (data) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "name": "ClawOS",
            "url": "https://clawoshq.com",
            "description": "Security-first AI skills platform for professionals"
          },
          {
            "@type": "WebSite",
            "name": "ClawOS",
            "url": "https://clawoshq.com"
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
