name: Enforce Feature Branch Policy

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  validate-branch-policy:
    name: Validate Branch Policy
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch name format
        run: |
          SOURCE_BRANCH="${{ github.head_ref }}"
          echo "Source branch: $SOURCE_BRANCH"

          VALID_PREFIXES="^(feat|fix|build|chore|ci|docs|perf|refactor|revert|style|test|claude|codex|dependabot)/.+"

          if [[ ! "$SOURCE_BRANCH" =~ $VALID_PREFIXES ]]; then
            echo "::error::Branch '$SOURCE_BRANCH' does not follow the required naming convention."
            echo "::error::PRs to main must come from a branch named: <type>/<name>"
            echo "::error::Valid types: feat, fix, build, chore, ci, docs, perf, refactor, revert, style, test, claude, codex, dependabot, release-please"
            exit 1
          fi

          echo "✓ Branch name '$SOURCE_BRANCH' is valid."
