name: Enforce Feature Branch Policy

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  validate-branch-policy:
    name: Validate Branch Policy
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch name format
        run: |
          SOURCE_BRANCH="${{ github.head_ref }}"
          echo "Source branch: $SOURCE_BRANCH"

          VALID_PREFIXES="^(feat|fix|build|chore|ci|docs|perf|refactor|revert|style|test|claude|codex|dependabot)/.+"
          RELEASE_PLEASE_PATTERN="^release-please--branches--[a-zA-Z0-9._-]+--components--[a-zA-Z0-9._-]+$"


          PR_ACTOR="${{ github.actor }}"

          if [[ "$SOURCE_BRANCH" =~ $RELEASE_PLEASE_PATTERN ]]; then
            if [[ "$PR_ACTOR" =~ \[bot\]$ ]]; then
              echo "✓ Branch '$SOURCE_BRANCH' is a Release Please branch created by bot actor '$PR_ACTOR'. Skipping naming convention check."
              exit 0
            else
              echo "::error::Branch '$SOURCE_BRANCH' matches the Release Please pattern but was opened by '$PR_ACTOR', not a bot account."
              exit 1
            fi
          fi

          if [[ ! "$SOURCE_BRANCH" =~ $VALID_PREFIXES ]]; then
            echo "::error::Branch '$SOURCE_BRANCH' does not follow the required naming convention."
            echo "::error::PRs to main must come from a branch named: <type>/<name>"
            echo "::error::Valid types: feat, fix, build, chore, ci, docs, perf, refactor, revert, style, test, claude, codex, dependabot"
            exit 1
          fi

          echo "✓ Branch name '$SOURCE_BRANCH' is valid."
