name: Enforce Feature Branch Policy

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  validate-branch-policy:
    name: Validate Branch Policy
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch name format
        run: |
          SOURCE_BRANCH="${{ github.head_ref }}"
          # Pattern for release-please branches
          RELEASE_PLEASE_PATTERN="^release-please--branches--[a-zA-Z0-9._-]+--components--[a-zA-Z0-9._-]+$"

          # Use the PR creator's login instead of the triggering actor
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          TRUSTED_RELEASE_BOT_PATTERN='^clawos-release-bot\[bot\]$'

          echo "Checking branch: $SOURCE_BRANCH"
          echo "PR created by: $PR_AUTHOR"

          # 1. Check if it's a Release Please branch created by a bot
          if [[ "$SOURCE_BRANCH" =~ $RELEASE_PLEASE_PATTERN ]]; then
            if [[ "$PR_AUTHOR" =~ $TRUSTED_RELEASE_BOT_PATTERN ]]; then
              echo "✓ Branch '$SOURCE_BRANCH' created by bot '$PR_AUTHOR'. Skipping naming convention check."
              exit 0
            else
              echo "::error::Branch '$SOURCE_BRANCH' matches the Release Please pattern but was created by '$PR_AUTHOR', not a bot."
              exit 1
            fi
          fi

          # 2. Standard naming convention enforcement for human contributors
          VALID_PREFIXES='^(feat|fix|build|chore|ci|docs|perf|refactor|revert|style|test|dependabot|claude|codex)/[a-z0-9./_-]+$'

          if [[ ! "$SOURCE_BRANCH" =~ $VALID_PREFIXES ]]; then
            echo "----------------------------------------------------------------"
            echo "ERROR: Invalid branch name '$SOURCE_BRANCH'"
            echo "Branch names must start with one of the following prefixes:"
            echo "feat/, fix/, build/, chore/, ci/, docs/, perf/, refactor/, revert/, style/, test/, claude/, codex/, or dependabot/"
            echo "Followed by lowercase alphanumeric characters, dots, slashes, underscores, or hyphens."
            echo "Example: feat/add-new-header"
            echo "----------------------------------------------------------------"
            exit 1
          fi

          echo "✓ Branch name '$SOURCE_BRANCH' follows the naming policy."
