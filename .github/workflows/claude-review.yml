name: Claude Review

on:
  # Automated review on every PR open or new push
  pull_request:
    types: [opened, synchronize, reopened]
  # Interactive mode — respond to @claude mentions in PR and issue comments
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Prevent parallel runs on the same PR from piling up
concurrency:
  group: claude-review-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  claude-review:
    name: Claude PR Review
    runs-on: ubuntu-latest

    # Least-privilege permissions — read code, write PR comments only
    permissions:
      contents: read
      pull-requests: write
      issues: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Automation prompt — runs on PR open/sync.
          # Interactive mode (@claude mentions) ignores this and responds to the comment instead.
          prompt: |
            Review this pull request for the ClawOS marketing site (clawoshq.com).

            This is a standalone React + TypeScript + Vite + Tailwind v4 project.
            It is NOT part of the ClawOS monorepo. It has no backend.

            Please check the following areas and report findings grouped by severity:

            ## TypeScript & code quality
            - Type errors or unsafe `any` usage
            - Unused imports or variables
            - Missing return types on exported functions
            - React key prop issues in mapped lists

            ## Design system compliance
            - All colours must use CSS variables (e.g. `var(--color-accent)`) or
              the exact design-system hex values — never arbitrary hex values
            - Design-system hex reference:
                #07090F bg | #0F1523 surface | #162035 surface-2 | #1C2A44 surface-3
                #00D4A1 accent | #6366F1 indigo | #DDE8F8 text | #8099B3 muted
                #4A6580 dim | #3D5266 chrome | #1E2F4A border | #EF4444 danger
            - Font families must be Syne (display), DM Sans (body), JetBrains Mono (data)
            - No inline `style=` for values that have a Tailwind token or CSS var equivalent

            ## Accessibility
            - Interactive elements (buttons, links) must have an accessible name
            - Icon-only elements need aria-label
            - Images need alt text
            - Form inputs need associated labels (htmlFor / id pair)
            - Colour contrast: check that text on dark surfaces meets WCAG AA

            ## Performance
            - No large media imports that would hurt bundle size or LCP
            - No synchronous blocking scripts
            - Fonts should load via Google Fonts with font-display: swap (already in index.html)

            ## Security
            - No API keys, tokens, or credentials anywhere in source
            - No third-party analytics or tracking scripts
            - No new npm dependencies without justification
              (run `npm audit --audit-level=high` — flag any high/critical findings)

            ## SEO
            - If index.html is changed: verify title, meta description, canonical,
              og:title, og:description, og:image are all present and correct

            ## Copy & brand
            - No future skills (ScrapeClaw, InvestClaw) described as already live
            - No promises of channels beyond Web and Telegram
            - Pro must be framed as a ClawOS-level upgrade, not CareerClaw-only

            Format your feedback as inline PR comments where possible.
            Use severity labels: 🔴 Must fix · 🟡 Should fix · 🟢 Suggestion.
            Skip nitpicks unless they affect correctness, accessibility, or brand integrity.

          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 5
