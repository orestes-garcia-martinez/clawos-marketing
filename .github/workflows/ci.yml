# ClawOS CI — runs on every push and PR
#
# Jobs:
#   security  — npm audit + Socket.dev supply chain + Snyk CVE scan
#               HIGH/CRITICAL findings block merge — non-negotiable.
#   quality   — ESLint + TypeScript typecheck + Prettier format check
#   test      — Vitest unit tests + Playwright e2e tests
#
# Required secrets (Settings → Secrets → Actions):
#   SOCKET_API_KEY   — Socket.dev API key (https://socket.dev)
#   SNYK_TOKEN       — Snyk token (https://app.snyk.io/account)

name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Security job ──────────────────────────────────────────────────────────────
jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      security-events: write # required for Snyk SARIF upload

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Socket Firewall
        uses: SocketDev/action@v1
        with:
          mode: firewall-free
          socket-token: ${{ secrets.SOCKET_API_KEY }}

      - name: Install dependencies through Socket
        run: sfw npm ci

      # ── npm audit — first line of defence ────────────────────────────────
      # Blocks on high and critical severity findings.
      - name: npm audit
        run: npm audit --audit-level=high

      # ── Snyk — CVE scanning for code + dependencies ───────────────────────
      - name: Snyk scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --all-projects

  # ── Quality job ───────────────────────────────────────────────────────────────
  quality:
    name: Lint + TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

      - name: Format check (Prettier)
        run: npm run format:check

  # ── Test job ──────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:run

  # ── E2E Test job ──────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [quality, test] # Only run e2e after quality and unit tests pass

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
