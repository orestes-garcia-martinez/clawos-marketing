name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      # Step A: Generate a high-privilege token using your App
      - name: Generate Token
        uses: actions/create-github-app-token@v4
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      # Step B: Pass that token to Release Please
      - name: Create Release
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          release-type: node

  # Optional: Deploy to Vercel on release
  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.release_created }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy to Vercel
        run: |
          echo "🚀 Deploying ${{ needs.release.outputs.tag_name }} to production"
          # Vercel auto-deploys on push, but you can add explicit deploy here
          # npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
